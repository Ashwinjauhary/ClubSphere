<head>

      "alternateName": ["Club Sphere", "clubsphere", "Club sphere", "CLUBSPHERE"],

        "@type": "ContactPoint",

        "https://www.instagram.com/clubsphere",
        "https://www.linkedin.com/company/clubsphere",
        "https://github.com/clubsphere"
      ]
    }
  </script>
